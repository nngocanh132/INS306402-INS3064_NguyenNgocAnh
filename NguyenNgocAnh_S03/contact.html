<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Contact Form</title>
</head>
<body>

<h2>Contact Us</h2>

<form action="submit.php" method="post">
    <label>
        Name:
        <input type="text" name="name">
    </label>
    <br><br>

    <label>
        Email:
        <input type="email" name="email">
    </label>
    <br><br>

    <label>
        Message:
        <textarea name="message"></textarea>
    </label>
    <br><br>

    <button type="submit">Send</button>
</form>

</body>
</html>
